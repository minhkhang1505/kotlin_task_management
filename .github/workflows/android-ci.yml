name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: action/checkout@v4

      - name: setup JDK
        uses: action/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew build
